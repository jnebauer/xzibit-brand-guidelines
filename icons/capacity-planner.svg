<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Calendar outline -->
  <rect x="8" y="14" width="48" height="42" rx="4" stroke="#19B1A1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Calendar top bar -->
  <line x1="8" y1="26" x2="56" y2="26" stroke="#19B1A1" stroke-width="2"/>
  <!-- Calendar pins -->
  <line x1="20" y1="8" x2="20" y2="20" stroke="#19B1A1" stroke-width="2" stroke-linecap="round"/>
  <line x1="44" y1="8" x2="44" y2="20" stroke="#19B1A1" stroke-width="2" stroke-linecap="round"/>
  <!-- Bar chart bars inside calendar -->
  <rect x="14" y="44" width="6" height="8" rx="1" stroke="#19B1A1" stroke-width="1.5"/>
  <rect x="24" y="38" width="6" height="14" rx="1" stroke="#19B1A1" stroke-width="1.5"/>
  <rect x="34" y="32" width="6" height="20" rx="1" stroke="#19B1A1" stroke-width="1.5"/>
  <rect x="44" y="36" width="6" height="16" rx="1" stroke="#19B1A1" stroke-width="1.5"/>
</svg>
