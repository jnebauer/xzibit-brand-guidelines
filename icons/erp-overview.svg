<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Central hub node -->
  <circle cx="32" cy="32" r="7" stroke="#19B1A1" stroke-width="2"/>
  <!-- Top node -->
  <circle cx="32" cy="10" r="5" stroke="#19B1A1" stroke-width="2"/>
  <!-- Bottom-left node -->
  <circle cx="12" cy="50" r="5" stroke="#19B1A1" stroke-width="2"/>
  <!-- Bottom-right node -->
  <circle cx="52" cy="50" r="5" stroke="#19B1A1" stroke-width="2"/>
  <!-- Connecting lines -->
  <line x1="32" y1="15" x2="32" y2="25" stroke="#19B1A1" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="26.5" y1="37.5" x2="16" y2="46" stroke="#19B1A1" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="37.5" y1="37.5" x2="48" y2="46" stroke="#19B1A1" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Small secondary nodes on connectors -->
  <circle cx="32" cy="20" r="2" fill="#19B1A1"/>
  <circle cx="21" cy="42" r="2" fill="#19B1A1"/>
  <circle cx="43" cy="42" r="2" fill="#19B1A1"/>
</svg>
