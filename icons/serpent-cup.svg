  <path d="M32 18 L46 22 L32 28Z" stroke="#19B1A1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Golf ball -->
  <circle cx="18" cy="46" r="4" stroke="#19B1A1" stroke-width="2"/>
  <!-- Ball dimple lines -->
  <line x1="15" y1="44" x2="21" y2="44" stroke="#19B1A1" stroke-width="1" stroke-linecap="round"/>
  <line x1="14" y1="47" x2="22" y2="47" stroke="#19B1A1" stroke-width="1" stroke-linecap="round"/>
